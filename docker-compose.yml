services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: synapse_app
    restart: unless-stopped
    env_file:
      - .env
    environment:
      DB_HOST: db
      DB_PORT: 3306
    ports:
      - "8000:80"
    volumes:
      - synapse_storage:/var/www/html/storage
    depends_on:
      db:
        condition: service_healthy

  db:
    image: mysql:8.0
    container_name: synapse_db
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: ${DB_DATABASE:-synapse}
      MYSQL_USER: ${DB_USERNAME:-synapse}
      MYSQL_PASSWORD: ${DB_PASSWORD:-synapse_password}
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD:-root_password}
    ports:
      - "3307:3306"
    volumes:
      - synapse_mysql:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "127.0.0.1", "-uroot", "-p${DB_ROOT_PASSWORD:-root_password}"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

volumes:
  synapse_mysql:
  synapse_storage:
